# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

permissions:
    contents: read

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
              with:
                  enable-cache: true

            - name: Ruff check
              run: uv run ruff check .

            - name: Ruff format
              run: uv run ruff format --check .

            - name: Djlint
              run: uv run djlint tablo_legacy_m3u/templates/ --lint --check

            - name: Stylelint
              run: npx stylelint "tablo_legacy_m3u/static/src/**/*.css"

            - name: Prettier
              run: npx prettier --check "tablo_legacy_m3u/static/src/**/*.{css,js}" "**/*.yaml"

    typecheck:
        name: Type check
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
              with:
                  enable-cache: true

            - name: mypy
              run: uv run mypy .

    test:
        name: Test
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci
            - run: npm run build

            - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
              with:
                  enable-cache: true

            - name: Run tests
              run: uv run pytest

    publish-edge:
        name: Publish edge image
        needs: [lint, typecheck, test]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Log in to GHCR
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

            - name: Build and push
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ghcr.io/${{ github.repository }}:edge
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
