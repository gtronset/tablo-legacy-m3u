services:
  tablo-legacy-m3u:
    build: .
    ports:
      - 5004:5004
    environment:
      PYTHONPATH: /app
      TABLO_IP: ""
      AUTODISCOVER_TABLO: true
      HOST: 0.0.0.0
      PORT: 5004
      LOG_LEVEL: DEBUG
      DEBUG: true
      ENABLE_EPG: true
      CACHE_TTL: 60
    volumes:
      - ./tablo_legacy_m3u:/app/tablo_legacy_m3u
    restart: unless-stopped
