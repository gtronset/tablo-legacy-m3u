services:
  tablo-legacy-m3u:
    image: ghcr.io/gtronset/tablo-legacy-m3u:latest
    ports:
      - 5004:5004
    environment:
      TABLO_IP: ""
      AUTODISCOVER_TABLO: true
      HOST: 0.0.0.0
      PORT: 5004
      LOG_LEVEL: INFO
      DEBUG: false
      ENABLE_EPG: true
      CACHE_TTL: 900
    restart: unless-stopped
